version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ram-infosys-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-ram_infosys}
      MYSQL_USER: ${DB_USER:-ram_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ram_password}
      TZ: Asia/Kolkata
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ram-infosys-net

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ram-infosys-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-ram_user}
      DB_PASSWORD: ${DB_PASSWORD:-ram_password}
      DB_NAME: ${DB_NAME:-ram_infosys}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ram-infosys-net
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ram-infosys-portal
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000/api}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - ram-infosys-net
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  ram-infosys-net:
    driver: bridge
